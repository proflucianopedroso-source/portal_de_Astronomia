<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Densidade da Água Potável Local</title>
    <link rel="icon" href="../../../assets/img/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Animação suave para o aparecimento dos dados */
        .data-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .data-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-cyan-100 to-blue-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-3xl w-full max-w-2xl overflow-hidden">
        
        <!-- Cabeçalho -->
        <div class="bg-gradient-to-r from-blue-600 to-cyan-500 p-6 text-white text-center">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Estimativa de Densidade da Água</h1>
            <p class="text-blue-100 mt-1 text-sm">Prof. Luciano Soares Pedroso</p>
            <p class="text-blue-200 mt-1 text-xs">© 2025 - Todos os direitos reservados</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            
            <!-- Área de Resultado Principal -->
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 text-center">
                <p class="text-sm font-medium text-blue-500 uppercase tracking-wider mb-2">Densidade Estimada</p>
                <div class="flex items-center justify-center space-x-2">
                    <span id="densidade" class="text-4xl md:text-5xl font-extrabold text-blue-700">---</span>
                    <span class="text-2xl font-semibold text-blue-400">kg/m³</span>
                </div>
                <p class="text-xs text-gray-400 mt-2">Erro estimado inferior a 1%</p>
            </div>

            <!-- Grid de Dados Coletados -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-600">
                
                <!-- Card Localização -->
                <div class="data-card bg-gray-50 rounded-xl p-4 flex items-center space-x-4">
                    <div class="p-3 bg-white rounded-full shadow-sm text-blue-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-medium text-gray-400 uppercase">Localização</p>
                        <p id="localizacao" class="text-base font-semibold text-gray-800 truncate">Aguardando...</p>
                    </div>
                </div>

                <!-- Card Temperatura -->
                <div class="data-card bg-gray-50 rounded-xl p-4 flex items-center space-x-4">
                    <div class="p-3 bg-white rounded-full shadow-sm text-red-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase">Temperatura</p>
                        <p class="text-base font-semibold text-gray-800"><span id="temperatura">--</span> °C</p>
                    </div>
                </div>

                <!-- Card Pressão -->
                <div class="data-card bg-gray-50 rounded-xl p-4 flex items-center space-x-4">
                    <div class="p-3 bg-white rounded-full shadow-sm text-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase">Pressão Atmosférica</p>
                        <p class="text-base font-semibold text-gray-800"><span id="pressao">--</span> hPa</p>
                    </div>
                </div>

                <!-- Card Altitude -->
                <div class="data-card bg-gray-50 rounded-xl p-4 flex items-center space-x-4">
                    <div class="p-3 bg-white rounded-full shadow-sm text-amber-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-medium text-gray-400 uppercase">Altitude</p>
                        <p class="text-base font-semibold text-gray-800"><span id="altitude">--</span> m</p>
                    </div>
                </div>

            </div>

            <!-- Botão de Ação -->
            <div class="pt-2">
                <button onclick="iniciarEstimativa()" id="btnAtualizar" 
                    class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform transition-all duration-200 hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
                    <span id="btnText">Atualizar Dados</span>
                </button>
            </div>

        </div>
    </div>

    <script>
        // Função auxiliar para formatar números com vírgula (Padrão PT-BR)
        // Aceita o valor e a quantidade de casas decimais
        const formatarNumero = (valor, casasDecimais = 2) => {
            if (valor === null || valor === undefined || isNaN(valor)) return '--';
            return new Intl.NumberFormat('pt-BR', {
                minimumFractionDigits: casasDecimais,
                maximumFractionDigits: casasDecimais
            }).format(valor);
        };

        async function iniciarEstimativa() {
            const btn = document.getElementById('btnAtualizar');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> Processando...';
            
            if (!navigator.geolocation) {
                alert("Geolocalização não é suportada neste navegador.");
                resetarBotao();
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // Exibe coordenadas com vírgula
                document.getElementById("localizacao").textContent = `${formatarNumero(lat, 4)}, ${formatarNumero(lon, 4)}`;
                
                try {
                    // Obter temperatura, pressão e altitude
                    const [dadosClima, altitude] = await Promise.all([
                        fetchDadosClimaticos(lat, lon),
                        fetchAltitude(lat, lon)
                    ]);

                    // Atualizar interface
                    atualizarDadosInterface(dadosClima, altitude);
                    
                    // Calcular densidade
                    // Passamos a altitude para o cálculo agora
                    if (dadosClima.temp && dadosClima.pressao && altitude) {
                        const densidade = calcularDensidadeAgua(dadosClima.temp, dadosClima.pressao, altitude);
                        document.getElementById("densidade").textContent = formatarNumero(densidade, 2);
                    } else {
                        document.getElementById("densidade").textContent = "Dados insuficientes";
                    }
                } catch (error) {
                    console.error("Erro geral ao obter dados:", error);
                    alert("Erro ao obter dados. Por favor, tente novamente mais tarde.");
                    document.getElementById("temperatura").textContent = "Erro";
                    document.getElementById("pressao").textContent = "Erro";
                    document.getElementById("altitude").textContent = "Erro";
                    document.getElementById("densidade").textContent = "Erro";
                } finally {
                    resetarBotao();
                }
            }, (error) => {
                console.error("Erro de geolocalização:", error);
                let mensagem = "Erro ao obter localização.";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        mensagem = "Permissão negada. Ative a localização e tente novamente.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        mensagem = "Localização indisponível.";
                        break;
                    case error.TIMEOUT:
                        mensagem = "Tempo de espera excedido.";
                        break;
                }
                alert(mensagem);
                document.getElementById("localizacao").textContent = "Erro";
                resetarBotao();
            });
        }

        function resetarBotao() {
            const btn = document.getElementById('btnAtualizar');
            const btnText = document.getElementById('btnText');
            btn.disabled = false;
            btnText.textContent = 'Atualizar Dados';
        }

        async function fetchDadosClimaticos(lat, lon) {
            const climaURL = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,pressure_msl&timezone=auto`;
            const respostaClima = await fetch(climaURL);
            const dadosClima = await respostaClima.json();
            
            let temp, pressao;
            if (dadosClima?.hourly?.time) {
                const agora = new Date().toISOString().slice(0, 13);
                const indexHora = dadosClima.hourly.time.findIndex(t => t.startsWith(agora));
                
                if (indexHora !== -1) {
                    temp = dadosClima.hourly.temperature_2m[indexHora];
                    pressao = dadosClima.hourly.pressure_msl[indexHora];
                }
            }
            
            return { temp, pressao };
        }

        async function fetchAltitude(latitude, longitude) {
            // Tentamos primeiro com a API mais precisa (ASTER 30m)
            try {
                const response = await fetch(
                    `https://api.opentopodata.org/v1/aster30m?locations=${latitude},${longitude}`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    if (data?.results?.[0]?.elevation !== undefined) {
                        return data.results[0].elevation;
                    }
                }
            } catch (e) {
                console.warn("Erro com ASTER 30m, tentando fallback...", e);
            }
            
            // Fallback para a API de elevação do Open-Meteo
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/elevation?latitude=${latitude}&longitude=${longitude}`
                );
                const data = await response.json();
                
                if (data.elevation?.length > 0) {
                    return data.elevation[0];
                }
            } catch (e) {
                console.error("Erro com fallback de altitude:", e);
                throw new Error("Não foi possível obter altitude");
            }
        }

        function atualizarDadosInterface(dadosClima, altitude) {
            // Usa a função de formatação para exibir com vírgula
            document.getElementById("temperatura").textContent = 
                dadosClima.temp != null ? formatarNumero(dadosClima.temp, 2) : "N/D";
            document.getElementById("pressao").textContent = 
                dadosClima.pressao != null ? formatarNumero(dadosClima.pressao, 1) : "N/D";
            document.getElementById("altitude").textContent = 
                altitude != null ? formatarNumero(altitude, 0) : "N/D";
        }

        function calcularDensidadeAgua(T, P = 1013.25, altitude = 0) {
            // Validação da temperatura (0°C a 40°C)
            if (T < 0 || T > 40) {
                console.warn('Temperatura fora da faixa recomendada (0-40°C). Resultado pode ser impreciso.');
            }

            // Cálculo da densidade a 1 atm (fórmula IAPWS modificada)
            const rho_1atm = (999.83952 +
                             (16.945176 * T) -
                             (7.9870401e-3 * Math.pow(T, 2)) -
                             (46.170461e-6 * Math.pow(T, 3)) +
                             (105.56302e-9 * Math.pow(T, 4)) -
                             (280.54253e-12 * Math.pow(T, 5))) /
                            (1 + (0.01687985 * T));

            // Correção de pressão considerando altitude
            // Nota: P recebido da API geralmente é pressão ao nível do mar (MSL).
            // Esta fórmula ajusta a pressão para a altitude local.
            const pressaoAbsoluta = P * Math.exp(-altitude / 8435); // Fórmula barométrica simplificada
            
            // Módulo de elasticidade da água (2.15 GPa convertido para hPa)
            const E = 2.15e7; // 2.15 GPa = 2.15e7 hPa
            
            // Fator de correção para pressão
            const fatorPressao = 1 + ((pressaoAbsoluta - 1013.25) / E);
            
            // Densidade final corrigida
            return rho_1atm * fatorPressao;
        }

        window.onload = iniciarEstimativa;
    </script>
</body>
</html>
