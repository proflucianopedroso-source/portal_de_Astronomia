  _model.addToFixedRelations(function() {
    if (!__pagesEnabled["FixRel Page"]) return;
    rad_day=-(solar_day/365)*2*Math.PI-3*Math.PI/2;  // > FixedRelations.FixRel Page:1
    dia_do_ano=solar_day-21;  // > FixedRelations.FixRel Page:2
    if (solar_day<11) {  // > FixedRelations.FixRel Page:3
        mes="março"   // > FixedRelations.FixRel Page:4
        dia_do_ano=solar_day+21;  // > FixedRelations.FixRel Page:5
      }  // > FixedRelations.FixRel Page:6
    else if (solar_day<41){  // > FixedRelations.FixRel Page:7
        mes="abril"  // > FixedRelations.FixRel Page:8
        dia_do_ano=solar_day-10;  // > FixedRelations.FixRel Page:9
      }  // > FixedRelations.FixRel Page:10
    else if (solar_day<72){  // > FixedRelations.FixRel Page:11
        mes="maio";  // > FixedRelations.FixRel Page:12
        dia_do_ano=solar_day-40;  // > FixedRelations.FixRel Page:13
      }  // > FixedRelations.FixRel Page:14
      else if (solar_day<102){  // > FixedRelations.FixRel Page:15
        mes="junho"  // > FixedRelations.FixRel Page:16
        dia_do_ano=solar_day-71;  // > FixedRelations.FixRel Page:17
      }  // > FixedRelations.FixRel Page:18
    else if (solar_day<133){  // > FixedRelations.FixRel Page:19
        mes="julho"  // > FixedRelations.FixRel Page:20
        dia_do_ano=solar_day-101;  // > FixedRelations.FixRel Page:21
        }  // > FixedRelations.FixRel Page:22
    else if (solar_day<164){  // > FixedRelations.FixRel Page:23
        mes="agosto"  // > FixedRelations.FixRel Page:24
        dia_do_ano=solar_day-132;  // > FixedRelations.FixRel Page:25
        }  // > FixedRelations.FixRel Page:26
    else if (solar_day<194){  // > FixedRelations.FixRel Page:27
        mes="setembro"  // > FixedRelations.FixRel Page:28
         dia_do_ano=solar_day-163;  // > FixedRelations.FixRel Page:29
        }  // > FixedRelations.FixRel Page:30
    else if (solar_day<225){    // > FixedRelations.FixRel Page:31
        mes="outubro"  // > FixedRelations.FixRel Page:32
         dia_do_ano=solar_day-193;  // > FixedRelations.FixRel Page:33
       }  // > FixedRelations.FixRel Page:34
    else if (solar_day<255){  // > FixedRelations.FixRel Page:35
        mes="novembro"  // > FixedRelations.FixRel Page:36
         dia_do_ano=solar_day-224;  // > FixedRelations.FixRel Page:37
        }  // > FixedRelations.FixRel Page:38
    else if (solar_day<286){  // > FixedRelations.FixRel Page:39
        mes="dezembro"  // > FixedRelations.FixRel Page:40
         dia_do_ano=solar_day-254;  // > FixedRelations.FixRel Page:41
        }  // > FixedRelations.FixRel Page:42
    else if (solar_day<317){  // > FixedRelations.FixRel Page:43
        mes="janeiro"  // > FixedRelations.FixRel Page:44
         dia_do_ano=solar_day-285;  // > FixedRelations.FixRel Page:45
        }  // > FixedRelations.FixRel Page:46
    else if (solar_day<345){  // > FixedRelations.FixRel Page:47
        mes="fevereiro"  // > FixedRelations.FixRel Page:48
         dia_do_ano=solar_day-316;  // > FixedRelations.FixRel Page:49
        }  // > FixedRelations.FixRel Page:50
    else if (solar_day<365){  // > FixedRelations.FixRel Page:51
        mes="março"  // > FixedRelations.FixRel Page:52
         dia_do_ano=solar_day-344;  // > FixedRelations.FixRel Page:53
        }  // > FixedRelations.FixRel Page:54
          // > FixedRelations.FixRel Page:55
    data=dia_do_ano+" de "+mes;  // > FixedRelations.FixRel Page:56
  });

  _model.addToFixedRelations(function() {
    if (!__pagesEnabled["latitude"]) return;
    lat1 = Math.PI/180*latitude;  // > FixedRelations.latitude:1
    horizonte_x=R*Math.cos(-rad_day+Math.PI/2)*Math.sin(Math.PI/2-lat1);    // > FixedRelations.latitude:2
    horizonte_y=R*Math.sin(-rad_day+Math.PI/2)*Math.sin(Math.PI/2-lat1);  // > FixedRelations.latitude:3
    horizonte_z=R*Math.cos(Math.PI/2-lat1);  // > FixedRelations.latitude:4
  });

  _model.addToFixedRelations(function() {
    if (!__pagesEnabled["coordenadas sol"]) return;
    x_sol=Math.sin(rad_day);  // > FixedRelations.coordenadas sol:1
    y_sol=Math.cos(rad_day)*Math.cos(l*Math.PI/180);  // > FixedRelations.coordenadas sol:2
    z_sol=Math.cos(rad_day)*Math.sin(l*Math.PI/180);  // > FixedRelations.coordenadas sol:3
    x_terra=R_t*Math.sin(rad_day-Math.PI/2);  // > FixedRelations.coordenadas sol:4
    y_terra=R_t*Math.cos(rad_day-Math.PI/2);  // > FixedRelations.coordenadas sol:5
    sombra_2d=l*Math.PI/180*Math.cos(rad_day);  // > FixedRelations.coordenadas sol:6
    incli_sombra=sombra_2d-lat1;  // > FixedRelations.coordenadas sol:7
    novacor ="rgba(0,64,255,"+Math.abs(Math.cos(incli_sombra))+")";  // > FixedRelations.coordenadas sol:8
    if (Math.abs(23.5*Math.PI*Math.cos(rad_day)/180-lat1)<Math.PI/2) {  // > FixedRelations.coordenadas sol:9
        spread = 0.3*(1+Math.abs(Math.tan(23.5*Math.PI*Math.cos(rad_day)/180-lat1)));  // > FixedRelations.coordenadas sol:10
        transparencia = Math.cos(Math.abs(23.5*Math.PI*Math.cos(rad_day)/180-lat1));  // > FixedRelations.coordenadas sol:11
        cor_spread =  "rgba(255,255,0,"+transparencia+")"  // > FixedRelations.coordenadas sol:12
    }  // > FixedRelations.coordenadas sol:13
    else {spread = 0};  // > FixedRelations.coordenadas sol:14
    if (Math.round(1800/Math.PI*Math.abs(23.5*Math.PI*Math.cos(rad_day)/180-lat1))/10 < 90) {  // > FixedRelations.coordenadas sol:15
    sol_inclination = "Altitude do Sol: "+Math.round(900-1800/Math.PI*Math.abs(23.5*Math.PI*Math.cos(rad_day)/180-lat1))/10+" °"  // > FixedRelations.coordenadas sol:16
       // > FixedRelations.coordenadas sol:17
    }  // > FixedRelations.coordenadas sol:18
    else {sol_inclination = "Sol abaixo do horizonte"}  // > FixedRelations.coordenadas sol:19
  });

  _model.addToFixedRelations(function() { _isPaused = _model.isPaused(); _isPlaying = _model.isPlaying(); });
