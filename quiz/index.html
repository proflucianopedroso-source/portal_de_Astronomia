/* 🌌 FUNDO ESTRELADO MELHORADO */
const canvas = document.getElementById("stars");
let ctx = canvas.getContext("2d");
let estrelas = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initEstrelas();
}

function initEstrelas() {
    estrelas = [];
    for(let i = 0; i < 250; i++) {
        estrelas.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.8,
            v: Math.random() * 0.3 + 0.05,
            brilho: Math.random() * 0.5 + 0.3
        });
    }
}

function animarEstrelas() {
    if(!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    estrelas.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, 2 * Math.PI);
        ctx.fillStyle = `rgba(255, 255, 255, ${e.brilho})`;
        ctx.fill();
        
        e.y += e.v;
        if(e.y > canvas.height) {
            e.y = 0;
            e.x = Math.random() * canvas.width;
        }
    });
    
    requestAnimationFrame(animarEstrelas);
}

window.addEventListener('resize', () => {
    resizeCanvas();
});

resizeCanvas();
animarEstrelas();

    "História da Astronomia", "Sistema Solar", "Astronomia Observacional", "Astronomia Observacional", "Astrofísica",
    "Astrofísica", "Sistema Solar", "Sistema Solar", "História da Astronomia", "Astronomia Observacional",
    "Astronomia Observacional", "Astronomia Observacional", "Astronomia Observacional", "Sistema Solar", "Sistema Solar",
    "Sistema Solar", "Sistema Solar", "História da Astronomia", "História da Astronomia", "Sistema Solar",
    "História da Astronomia", "Astronomia Observacional", "Sistema Solar", "Sistema Solar", "Sistema Solar",
    "História da Astronomia", "História da Astronomia", "Astronomia do Cotidiano", "Astrofísica", "Astrofísica",
    "Astrofísica", "História da Astronomia", "História da Astronomia", "Sistema Solar", "Astrofísica",
    "Astronomia Observacional", "Sistema Solar", "Astrofísica", "Astronomia do Cotidiano", "História da Astronomia",
    "Astronomia Observacional", "Astrofísica", "Astronomia Observacional", "Astronomia Observacional", "Sistema Solar",
    "História da Astronomia", "Astronomia do Cotidiano", "Astrofísica", "Astronomia Observacional", "Sistema Solar",
    "Astrofísica", "História da Astronomia"
];

const areaQuestaoDiv = document.getElementById("areaQuestao");
const indiceSpan = document.getElementById("indice");
const progressoSpan = document.getElementById("progresso");
const btnAnteriorEl = document.getElementById("btnAnterior");
const btnProximaEl = document.getElementById("btnProxima");
const placarDiv = document.getElementById("placar");
const mensagemDiv = document.getElementById("mensagem");
const resultadosContainer = document.getElementById("resultadosContainer");
const estatisticasDiv = document.getElementById("estatisticasCategorias");

const somPergunta = document.getElementById("somPergunta");
const somClique = document.getElementById("somClique");
const somSuspense = document.getElementById("somSuspense");

function tocarSom(audio) {
    if(audio) audio.play().catch(e => console.log("Áudio:", e));
}

function mostrar() {
    const q = questoes[atual];
    const html = `
        <div class="questao ativa">
            <div class="enunciado">${q.enunciado}</div>
            <div class="opcoes">
                <label class="opcao ${respostas[atual] === true ? 'selecionada' : ''}">
                    <input type="radio" name="resposta" value="correto" style="display:none;" ${respostas[atual] === true ? 'checked' : ''}>
                    <span>✅ CORRETO</span>
                </label>
                <label class="opcao ${respostas[atual] === false ? 'selecionada' : ''}">
                    <input type="radio" name="resposta" value="incorreto" style="display:none;" ${respostas[atual] === false ? 'checked' : ''}>
                    <span>❌ INCORRETO</span>
                </label>
            </div>
        </div>
    `;
    areaQuestaoDiv.innerHTML = html;
    indiceSpan.textContent = `Questão ${atual + 1}/${questoes.length}`;
    
    btnAnteriorEl.disabled = atual === 0;
    btnProximaEl.disabled = atual === questoes.length - 1;
    
    document.querySelectorAll('.opcao').forEach((opt, idx) => {
        opt.addEventListener('click', () => {
            respostas[atual] = idx === 0;
            document.querySelectorAll('.opcao').forEach(o => o.classList.remove('selecionada'));
            opt.classList.add('selecionada');
            tocarSom(somClique);
        });
    });
}

function proxima() {
    if(atual < questoes.length - 1) {
        atual++;
        mostrar();
        tocarSom(somPergunta);
    }
}

function anterior() {
    if(atual > 0) {
        atual--;
        mostrar();
    }
}

function finalizar() {
    btnAnteriorEl.disabled = true;
    btnProximaEl.disabled = true;
    document.getElementById('btnFinalizar').disabled = true;
    tocarSom(somSuspense);
    
    setTimeout(() => {
        const categorias = ["Astronomia do Cotidiano", "Astronomia Observacional", "Sistema Solar", "Astrofísica", "História da Astronomia"];
        let acertosPorCategoria = {
            "Astronomia do Cotidiano": { acertos: 0, total: 0 },
            "Astronomia Observacional": { acertos: 0, total: 0 },
            "Sistema Solar": { acertos: 0, total: 0 },
            "Astrofísica": { acertos: 0, total: 0 },
            "História da Astronomia": { acertos: 0, total: 0 }
        };
        
        questoes.forEach((q, i) => {
            let cat = categoriasQuestoes[i];
            if(acertosPorCategoria[cat]) {
                acertosPorCategoria[cat].total++;
                if(respostas[i] === q.correto) acertosPorCategoria[cat].acertos++;
            }
        });
        
        let percentuais = categorias.map(cat => (acertosPorCategoria[cat].acertos / acertosPorCategoria[cat].total) * 100);
        
        // Esconder questão e indicadores
        areaQuestaoDiv.style.display = "none";
        progressoSpan.style.display = "none";
        indiceSpan.style.display = "none";
        
        // Mostrar resultados
        resultadosContainer.style.display = "block";
        
        // Criar gráfico radar
        const ctxRadar = document.getElementById('radarChart').getContext('2d');
        if(window.radarChartInstance) window.radarChartInstance.destroy();
        
        window.radarChartInstance = new Chart(ctxRadar, {
            type: 'radar',
            data: {
                labels: categorias,
                datasets: [{
                    label: 'Acertos (%)',
                    data: percentuais,
                    backgroundColor: 'rgba(255, 217, 94, 0.35)',
                    borderColor: '#ffd95e',
                    borderWidth: 3,
                    pointBackgroundColor: '#ffd95e',
                    pointBorderColor: '#ffffff',
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            stepSize: 20,
                            backdropColor: 'transparent',
                            color: '#dddddd',
                            font: { size: 10 }
                        },
                        grid: { color: 'rgba(255,255,255,0.2)' },
                        angleLines: { color: 'rgba(255,255,255,0.2)' },
                        pointLabels: { color: '#ffd95e', font: { size: 11, weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#ffffff', font: { size: 12 } }, position: 'bottom' },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)}%` } }
                }
            }
        });
        
        // Cards de estatísticas
        let statsHtml = '';
        categorias.forEach(cat => {
            let t = acertosPorCategoria[cat].total;
            let a = acertosPorCategoria[cat].acertos;
            let perc = (a / t * 100).toFixed(1);
            statsHtml += `
                <div class="card-categoria">
                    <h4>${cat}</h4>
                    <div class="acertos">${a}/${t}</div>
                    <span class="percentual">${perc}%</span>
                </div>
            `;
        });
        estatisticasDiv.innerHTML = statsHtml;
        
        let totalPontos = 0;
        questoes.forEach((q, i) => { if(respostas[i] === q.correto) totalPontos++; });
        
        let msg = "";
        if(totalPontos === questoes.length) msg = "🌟 PERFEITO! Você é um astrônomo! 🌟";
        else if(totalPontos >= 60) msg = "🔭 Excelente! Conhecimento fora de série!";
        else if(totalPontos >= 45) msg = "⚡ Muito bom! Continue explorando o Universo!";
        else if(totalPontos >= 30) msg = "🌗 Bom! Hora de revisar alguns conceitos!";
        else msg = "🌎 Que tal estudar mais Astronomia e Astrofísica?";
        
        mensagemDiv.innerHTML = msg;
        placarDiv.style.display = "block";
        placarDiv.innerHTML = `🏆 Total: ${totalPontos}/${questoes.length}`;
        
        resultadosContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 1800);
}

mostrar();

</script>
</body>
</html>
